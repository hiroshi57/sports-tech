# sports-tech ローカル開発環境
#
# 起動:  docker compose up --build
# 停止:  docker compose down
# DBのみ: docker compose up -d db redis
#
# 本番デプロイには使用しない（ローカル/検証用）。

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sportstech
      POSTGRES_PASSWORD: sportstech
      POSTGRES_DB: sportstech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportstech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://sportstech:sportstech@db:5432/sportstech
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 起動時に DB マイグレーションを適用してから API を起動
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://sportstech:sportstech@db:5432/sportstech
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app

volumes:
  pgdata:
